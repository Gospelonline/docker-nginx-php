name: Meu Primeiro Workflow

on:
  push:
    branches:
      - main

jobs:
  teste:

    runs-on: ubuntu-latest

    steps:

      - name: Baixar código
        uses: actions/checkout@v4

      - name: Mostrar arquivos
        run: ls -la

      - name: Mostrar data
        run: date

      - name: Mostrar versão do Docker
        run: docker --version
