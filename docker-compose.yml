services:

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./site:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - todimonet

  php:
    build: ./php
    container_name: php
    restart: unless-stopped
    volumes:
      - ./site:/var/www/html
    networks:
      - todimonet

  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: todimoti
      MYSQL_USER: todimo
      MYSQL_PASSWORD: Todimo5562
    volumes:
      - ./mariadb:/var/lib/mysql
    networks:
      - todimonet

networks:
  todimonet:
